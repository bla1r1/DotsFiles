#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# ── Cursor theme ──
env = XCURSOR_THEME,Bibata-Modern-Ice

# ── GTK dark theme ──
env = GTK_THEME,Catppuccin-Mocha
env = GDK_BACKEND,wayland,x11,*
env = GTK2_RC_FILES,/usr/share/themes/Catppuccin-Mocha/gtk-2.0/gtkrc

# ── Qt / KDE dark theme ──
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum

# ── Kvantum тема (тёмная) ──
env = KVANTUM_THEME,KvantumDark

# ── libadwaita / GNOME приложения (nautilus, gedit и т.д.) ──
env = ADW_DEBUG_COLOR_SCHEME,prefer-dark

# ── Electron / Chromium (VSCode, Discord, Obsidian и т.д.) ──
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ── SDL приложения ──
env = SDL_VIDEODRIVER,wayland

# ── Clutter (GNOME mutter based) ──
env = CLUTTER_BACKEND,wayland

# ── Java приложения (IntelliJ, Android Studio и т.д.) ──
env = _JAVA_AWT_WM_NONREPARENTING,1
env = AWT_TOOLKIT,MToolkit