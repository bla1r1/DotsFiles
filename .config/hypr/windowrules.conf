# ── FLOAT ────────────────────────────────────────────────────────

windowrule {
    name        = float-firefox-pip
    match:class = ^(firefox)$
    match:title = ^(Picture-in-Picture)$
    float       = true
    pseudo      = true
    pin         = true
}

windowrule {
    name        = float-copyq
    match:class = ^(com.github.hluk.copyq)$
    float       = true
    size        = 20% 70%
    move        = 79.6% 4%
}

windowrule {
    name        = float-polkit
    match:class = ^(org.kde.polkit-kde-authentication-agent-1)$
    float       = true
}

windowrule {
    name        = float-pavucontrol
    match:class = ^(pavucontrol)$
    float       = true
}

windowrule {
    name        = float-blueman
    match:class = ^(blueman-manager)$
    float       = true
}

windowrule {
    name        = float-qt5ct
    match:class = ^(qt5ct)$
    float       = true
}

windowrule {
    name        = float-ark
    match:class = ^(org.kde.ark)$
    float       = true
}

windowrule {
    name        = float-nm-applet
    match:class = ^(nm-applet)$
    float       = true
}

windowrule {
    name        = float-nmtui
    match:class = ^(nmtui)$
    float       = true
}

windowrule {
    name        = float-nm-connection-editor
    match:class = ^(nm-connection-editor)$
    float       = true
}

windowrule {
    name        = float-nwg-look
    match:class = ^(nwg-look)$
    float       = true
}

windowrule {
    name        = float-yad
    match:class = ^(yad)$
    float       = true
    center      = true
    size        = 80% 80%
}

# ── WORKSPACE ────────────────────────────────────────────────────

windowrule {
    name        = ws-obsidian
    match:class = ^(obsidian)$
    workspace   = empty
}

windowrule {
    name        = ws-spotify
    match:class = ^(spotify)$
    workspace   = empty
}

windowrule {
    name        = ws-darktable
    match:class = ^(Darktable)$
    workspace   = empty
}

windowrule {
    name        = ws-inkscape
    match:class = ^(org.inkscape.Inkscape)$
    workspace   = empty
}

windowrule {
    name        = ws-gimp
    match:class = ^(Gimp-2.10)$
    workspace   = empty
}

# ── LAYER RULES ──────────────────────────────────────────────────

layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 1, match:namespace notifications
layerrule = blur on, match:namespace gtk-layer-shell
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 1, match:namespace waybar

# ── DEFAULT WINDOW RULES (from previous configuration) ────────────

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name          = fix-xwayland-drags
    match:class   = ^$
    match:title   = ^$
    match:xwayland = true
    match:float   = true
    match:fullscreen = false
    match:pin     = false
    no_focus      = true
}

windowrule {
    name        = move-hyprland-run
    match:class = hyprland-run
    move        = 20 monitor_h-120
    float       = yes
}
# ── VIRTUALBOX ────────────────────────────────────────────────────

windowrule {
    name        = vbox-manager
    match:class = ^(VirtualBox Manager)$
    opacity     = 1.0 override 1.0 override
    no_blur     = on
}

windowrule {
    name        = vbox-vm
    match:class = ^(VirtualBoxVM)$
    opacity     = 1.0 override 1.0 override
    no_blur     = on
}

# Extra window in fullscreen: keep floating to avoid tiling
windowrule {
    name        = vbox-machine-float
    match:class = ^(VirtualBox Machine)$
    float       = true
    opacity     = 1.0 override 1.0 override
    no_blur     = on
}
