##############################
### WINDOWS AND WORKSPACES ###
##############################

# ── OPACITY & BLUR ──────────────────────────────────────────────

# Global opacity for all windows
windowrule {
    name      = global-opacity
    match:class = ^(.*)$
    opacity   = 1.0 0.70
}

# Windows without transparency
windowrule {
    name      = opaque-firefox
    match:class = ^(firefox)$
    opacity   = 1.0 override 1.0 override
}

windowrule {
    name        = opaque-chrome
    match:class = ^(org.gnome.Nautilus)$
    opacity     = 1.0 override 1.0 override
    no_blur     = on
}

windowrule {
    name        = opaque-vscode
    match:class = ^(code|code-url-handler|VSCodium|codium)$
    opacity     = 1.0 override 1.0 override
    no_blur     = on
}

windowrule {
    name      = opaque-libreoffice
    match:class = ^(libreoffice-writer)$
    opacity   = 1.0 override 1.0 override
}

windowrule {
