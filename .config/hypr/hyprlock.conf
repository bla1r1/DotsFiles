background {
    monitor =
    path =
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 320, 55
    outline_thickness = 2

    outer_color = rgba(0,0,0,0)
    inner_color = rgba(20,20,30,0.9)
    font_color = rgba(230,230,230,1)

    dots_spacing = 0.35
    dots_center = true
    fade_on_empty = false

    placeholder_text = Enter password...

    fail_color = rgba(255,80,80,1)
    fail_text = Wrong password

    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 72
    font_family = Fira Sans SemiBold
    color = rgba(220,220,220,0.9)

    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] bash -c 'if [ "$(cat /sys/class/leds/input*::capslock/brightness 2>/dev/null | head -n1)" = "1" ]; then echo "⇪ CAPS LOCK"; fi'
    font_size = 18
    font_family = Fira Sans
    color = rgba(255,120,120,0.9)

    position = 0, -150
    halign = center
    valign = center
}