#################
### AUTOSTART ###
#################

# DBus / environment 
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE

# GTK theme
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = gsettings set org.gnome.desktop.interface gtk-theme Catppuccin-Mocha
exec-once = gsettings set org.gnome.desktop.interface icon-theme Papirus-Dark

exec-once = waypaper --restore

exec-once = nm-applet
exec-once = systemctl --user start hyprpolkitagent
exec-once = copyq

# Idle daemon
exec-once = hypridle

# UI
exec-once = waybar
exec-once = swaync