#############
### INPUT ###
#############
# Docs: https://man.archlinux.org/man/sway-input.5

input "type:keyboard" {
    xkb_layout  de,ua
    xkb_options grp:alt_shift_toggle
}

input "type:pointer" {
    accel_profile flat
    pointer_accel 0          # -1.0 … 1.0
}

input "type:touchpad" {
    natural_scroll disabled
    tap enabled
}

# Per-device override (replace identifier with actual device id from `swaymsg -t get_inputs`)
# input "1234:5678:Epic_Mouse_v1" {
#     pointer_accel -0.5
# }
