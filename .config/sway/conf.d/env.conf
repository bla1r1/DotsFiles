#############################
### ENVIRONMENT VARIABLES ###
#############################
# In Sway env vars are set via the shell profile (~/.profile / ~/.bash_profile / ~/.zshenv)
# OR injected into the systemd user session.
# Lines below are for reference — paste them into ~/.profile (or equivalent).
#
# export XCURSOR_SIZE=24
# export XCURSOR_THEME=Bibata-Modern-Ice
# export GTK_THEME=Catppuccin-Mocha:dark
# export GDK_BACKEND=wayland,x11,*
# export GTK2_RC_FILES=/usr/share/themes/Catppuccin-Mocha/gtk-2.0/gtkrc
# export QT_QPA_PLATFORM=wayland;xcb
# export QT_AUTO_SCREEN_SCALE_FACTOR=1
# export QT_WAYLAND_DISABLE_WINDOWDECORATION=1
# export QT_QPA_PLATFORMTHEME=qt6ct
# export QT_STYLE_OVERRIDE=kvantum
# export KVANTUM_THEME=KvantumDark
# export ADW_DEBUG_COLOR_SCHEME=prefer-dark
# export ELECTRON_OZONE_PLATFORM_HINT=auto
# export ELECTRON_ENABLE_WAYLAND=1
# export MOZ_ENABLE_WAYLAND=1
# export MOZ_GTK_TITLEBAR_DECORATION=client
# export SDL_VIDEODRIVER=wayland
# export CLUTTER_BACKEND=wayland
# export _JAVA_AWT_WM_NONREPARENTING=1
# export AWT_TOOLKIT=MToolkit
# export XDG_CURRENT_DESKTOP=sway
# export XDG_SESSION_TYPE=wayland

# Passes the most important vars into the systemd user session
# so that apps launched via .desktop files see them.
# NOTE: dbus-update-activation-environment is called in autostart.conf — no need to duplicate here.
exec systemctl --user import-environment \
    WAYLAND_DISPLAY \
    XDG_CURRENT_DESKTOP \
    XDG_SESSION_TYPE \
    XCURSOR_THEME \
    XCURSOR_SIZE \
    GTK_THEME \
    QT_QPA_PLATFORM \
    QT_QPA_PLATFORMTHEME
