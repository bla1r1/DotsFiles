###################
### KEYBINDINGS ###
###################

set $mod Mod4
set $lock bash $HOME/.config/sway/scripts/swaylock.sh

# ── Core ──────────────────────────────────────────────────────────
bindsym --to-code $mod+t         exec $terminal
bindsym --to-code $mod+q         kill
bindsym --to-code $mod+e         exec $fileManager
bindsym --to-code $mod+space     exec $menu
bindsym --to-code $mod+f         exec firefox
bindsym --to-code $mod+g         exec github-desktop
bindsym --to-code $mod+v         exec virt-manager
bindsym --to-code $mod+s         exec steam
bindsym --to-code $mod+d         exec discord
bindsym --to-code $mod+w         exec waypaper --backend swaybg

# Scripts
bindsym --to-code $mod+shift+s   exec bash $HOME/.config/sway/scripts/quick-settings.sh
bindsym --to-code $mod+h         exec bash $HOME/.config/sway/scripts/keyhints.sh

# ── Layout ────────────────────────────────────────────────────────
bindsym --to-code $mod+shift+v   floating toggle
bindsym --to-code $mod+shift+f   fullscreen toggle
bindsym --to-code $mod+ctrl+f    fullscreen toggle global

# Split direction
bindsym --to-code $mod+shift+i   split toggle
bindsym --to-code $mod+j         layout toggle split

# ── Focus (arrow keys) ────────────────────────────────────────────
bindsym --to-code $mod+Left      focus left
bindsym --to-code $mod+Right     focus right
bindsym --to-code $mod+Up        focus up
bindsym --to-code $mod+Down      focus down

# ── Move windows (Ctrl+arrows) ────────────────────────────────────
bindsym --to-code $mod+ctrl+Left  move left
bindsym --to-code $mod+ctrl+Right move right
bindsym --to-code $mod+ctrl+Up    move up
bindsym --to-code $mod+ctrl+Down  move down

# ── Resize windows (Shift+arrows) ────────────────────────────────
bindsym --to-code $mod+shift+Left  resize shrink width  50px
bindsym --to-code $mod+shift+Right resize grow   width  50px
bindsym --to-code $mod+shift+Up    resize shrink height 50px
bindsym --to-code $mod+shift+Down  resize grow   height 50px

# ── Workspaces ────────────────────────────────────────────────────
bindsym --to-code $mod+1  workspace number 1
bindsym --to-code $mod+2  workspace number 2
bindsym --to-code $mod+3  workspace number 3
bindsym --to-code $mod+4  workspace number 4
bindsym --to-code $mod+5  workspace number 5
bindsym --to-code $mod+6  workspace number 6
bindsym --to-code $mod+7  workspace number 7
bindsym --to-code $mod+8  workspace number 8
bindsym --to-code $mod+9  workspace number 9
bindsym --to-code $mod+0  workspace number 10

bindsym --to-code $mod+shift+1  move container to workspace number 1
bindsym --to-code $mod+shift+2  move container to workspace number 2
bindsym --to-code $mod+shift+3  move container to workspace number 3
bindsym --to-code $mod+shift+4  move container to workspace number 4
bindsym --to-code $mod+shift+5  move container to workspace number 5
bindsym --to-code $mod+shift+6  move container to workspace number 6
bindsym --to-code $mod+shift+7  move container to workspace number 7
bindsym --to-code $mod+shift+8  move container to workspace number 8
bindsym --to-code $mod+shift+9  move container to workspace number 9
bindsym --to-code $mod+shift+0  move container to workspace number 10

# Scroll through workspaces
bindsym --to-code --whole-window $mod+button4 workspace next
bindsym --to-code --whole-window $mod+button5 workspace prev

# Scratchpad
bindsym --to-code $mod+ctrl+s       scratchpad show
bindsym --to-code $mod+ctrl+shift+s move scratchpad

# ── Mouse: move / resize floating ────────────────────────────────
floating_modifier $mod normal

# ── Alt+Tab ───────────────────────────────────────────────────────
bindsym --to-code alt+Tab focus next

# ── Screenshots ───────────────────────────────────────────────────
bindsym --to-code $mod+Print             exec bash $HOME/.config/sway/scripts/screenshot.sh full
bindsym --to-code $mod+alt+Print         exec bash $HOME/.config/sway/scripts/screenshot.sh monitor
bindsym --to-code $mod+shift+Print       exec bash $HOME/.config/sway/scripts/screenshot.sh region
bindsym --to-code alt+Print              exec bash $HOME/.config/sway/scripts/screenshot.sh window
bindsym --to-code $mod+ctrl+Print        exec bash $HOME/.config/sway/scripts/screenshot.sh delay5
bindsym --to-code $mod+ctrl+shift+Print  exec bash $HOME/.config/sway/scripts/screenshot.sh delay10

# ── Screen lock ───────────────────────────────────────────────────
bindsym --to-code ctrl+alt+l exec $lock

# ── Exit sway (with confirmation via rofi) ────────────────────────
bindsym --to-code $mod+shift+m exec swaynag -t warning \
    -m "Exit sway?" \
    -b "Yes" "swaymsg exit"

# ── Multimedia keys ───────────────────────────────────────────────
bindsym --to-code --locked XF86AudioRaiseVolume  exec wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindsym --to-code --locked XF86AudioLowerVolume  exec wpctl set-volume    @DEFAULT_AUDIO_SINK@ 5%-
bindsym --to-code --locked XF86AudioMute         exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindsym --to-code --locked XF86AudioMicMute      exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindsym --to-code --locked XF86MonBrightnessUp   exec brightnessctl -e4 -n2 set 5%+
bindsym --to-code --locked XF86MonBrightnessDown exec brightnessctl -e4 -n2 set 5%-

bindsym --to-code --locked XF86AudioNext  exec playerctl next
bindsym --to-code --locked XF86AudioPause exec playerctl play-pause
bindsym --to-code --locked XF86AudioPlay  exec playerctl play-pause
bindsym --to-code --locked XF86AudioPrev  exec playerctl previous
