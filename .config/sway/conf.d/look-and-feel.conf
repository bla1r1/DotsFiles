#####################
### LOOK AND FEEL ###
#####################
# Tokyo Night color scheme
# Blur and rounded corners require swayFX (drop-in Sway fork):
#   https://github.com/WillPower3309/swayfx
# Plain Sway: corners are square, no blur — everything else works as-is.

# ── Colors (for use in client.* below) ───────────────────────────
# bg         = #1a1b26
# bg_dark    = #16161e
# fg         = #a9b1d6
# fg_bright  = #c0caf5
# blue       = #7aa2f7
# purple     = #bb9af7
# cyan       = #7dcfff
# green      = #73daca
# yellow     = #e0af68
# red        = #f7768e
# comment    = #414868
# border_off = #101014

# ── Gaps (sway native) ────────────────────────────────────────────
gaps inner 5
gaps outer 20

# ── Borders ───────────────────────────────────────────────────────
default_border          pixel 2
default_floating_border pixel 2

# client.<state> <border> <background> <text> <indicator> <child_border>
client.focused          #7aa2f7 #1a1b26 #c0caf5 #bb9af7 #7aa2f7
client.focused_inactive #101014 #16161e #a9b1d6 #101014 #101014
client.unfocused        #101014 #16161e #a9b1d6 #101014 #101014
client.urgent           #f7768e #1a1b26 #c0caf5 #f7768e #f7768e

# ── swayFX extras (ignored by plain sway) ────────────────────────
corner_radius 10
blur enable
blur_passes 3
blur_radius 4
shadows enable
shadow_color #cc1a1b26
default_dim_inactive 0.05

# ── Font ──────────────────────────────────────────────────────────
font pango:Fira Sans SemiBold 10

# ── Tiling layout ────────────────────────────────────────────────
workspace_layout default
