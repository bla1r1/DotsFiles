##############################
### WINDOWS AND WORKSPACES ###
##############################
# Docs: https://man.archlinux.org/man/sway.5  (for_window / assign)
#
# NOTE: Sway does not have per-window opacity or blur natively.
# Opacity rules require swayFX, or a compositor like picom (X11 only).
# With swayFX: for_window [app_id="kitty"] opacity 0.95

# ── FLOATING ─────────────────────────────────────────────────────

# Firefox PiP
for_window [app_id="firefox" title="Picture-in-Picture"] floating enable, sticky enable

# CopyQ
for_window [app_id="com.github.hluk.copyq"] floating enable
for_window [app_id="com.github.hluk.copyq"] resize set 20 ppt 70 ppt
for_window [app_id="com.github.hluk.copyq"] move position 79 ppt 4 ppt

# Polkit
for_window [app_id="org.kde.polkit-kde-authentication-agent-1"] floating enable
for_window [app_id="polkit-gnome-authentication-agent-1"]        floating enable

# Audio / Bluetooth / Network
for_window [app_id="pavucontrol"]           floating enable
for_window [app_id="blueman-manager"]       floating enable
for_window [app_id="nm-applet"]             floating enable
for_window [app_id="nmtui"]                 floating enable
for_window [app_id="nm-connection-editor"]  floating enable

# Qt / KDE tools
for_window [app_id="qt5ct"]      floating enable
for_window [app_id="org.kde.ark"] floating enable
for_window [app_id="nwg-look"]   floating enable

# YAD dialogs
for_window [app_id="yad"] floating enable
for_window [app_id="yad"] resize set 80 ppt 80 ppt
for_window [app_id="yad"] move position center

# Virt-manager / QEMU
# NOTE: verify real app_id via: swaymsg -t get_tree | jq '.. | .app_id? // empty'
for_window [app_id="virt-manager"]   floating disable
for_window [app_id="remote-viewer"]  floating enable
for_window [app_id="qemu"]           floating enable   # was "QEMU" — Wayland app_ids are lowercase

# ── WORKSPACE ASSIGNMENTS ────────────────────────────────────────

assign [app_id="obsidian"]               workspace 4
assign [app_id="spotify"]                workspace 5
assign [app_id="darktable"]              workspace 6   # was "Darktable" — likely lowercase on Wayland
assign [app_id="org.inkscape.Inkscape"]  workspace 7
assign [app_id="gimp"]                   workspace 7   # was "Gimp-2.10" — check with get_tree

# ── swayFX: blur on layers (ignored by plain sway) ───────────────
# layer_effects "notifications"   blur enable; ignore_alpha 1
# layer_effects "gtk-layer-shell" blur enable
# layer_effects "waybar"          blur enable; ignore_alpha 1
