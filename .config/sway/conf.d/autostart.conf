#################
### AUTOSTART ###
#################

# DBus / environment (single source of truth — env.conf handles systemctl import)
exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE

# GTK theme
exec gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec gsettings set org.gnome.desktop.interface gtk-theme Tokyonight-Dark
exec gsettings set org.gnome.desktop.interface icon-theme Papirus-Dark

# Wallpaper
exec bash $HOME/.config/sway/scripts/wallpaper.sh restore

# Network applet
exec nm-applet --indicator

# Polkit agent
exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Clipboard manager
exec copyq

# ── Idle + Lock ───────────────────────────────────────────────────
# Requires: swaylock-effects (paru -S swaylock-effects)
exec bash $HOME/.config/sway/scripts/swayidle.sh

# UI
exec waybar
exec swaync
